name: Zerp macOS ARM Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: zerp-macos-arm-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build_release:
    name: Build and publish Zerp.app
    runs-on: macos-14
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Prepare Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install DMG tooling
        run: brew list create-dmg >/dev/null 2>&1 || brew install create-dmg

      - name: Compute release tag
        id: version
        run: |
          tag="v1.$(date -u +'%Y.%m.%d.%H.%M')_${GITHUB_RUN_NUMBER}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build macOS arm64 bundle
        env:
          GIT_RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          ./script/macos/bundle \
            --channel zerp \
            --arch aarch64 \
            --dmg-name-suffix arm64 \
            --selfsign \
            --release-tag "$GIT_RELEASE_TAG"

      - name: Verify bundle architecture
        run: |
          file target/aarch64-apple-darwin/release-lto/bundle/osx/Zerp.app/Contents/MacOS/zerp
          lipo -archs target/aarch64-apple-darwin/release-lto/bundle/osx/Zerp.app/Contents/MacOS/zerp | grep -qx arm64
          codesign -v target/aarch64-apple-darwin/release-lto/bundle/osx/Zerp.app

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            target/release-lto/bundle/osx/Zerp-arm64.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --latest \
            --title "Zerp $TAG" \
            --notes "macOS arm64 local Zerp build."
