name: Zerp CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  macos_arm_check:
    name: macOS arm64 cargo check
    runs-on: macos-14
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Check Zerp
        run: cargo check --locked --target aarch64-apple-darwin --bin zerp --features gui
