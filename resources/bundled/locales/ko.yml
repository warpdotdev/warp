    profiles_description: "프로필을 사용하면 에이전트가 취할 수 있는 작업과 승인이 필요한 시점부터 코딩·계획 같은 작업에 사용할 모델까지, 에이전트의 작동 방식을 정의할 수 있습니다. 개별 프로젝트 단위로 범위를 지정할 수도 있습니다."
