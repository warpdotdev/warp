    base_model_description: "이 모델은 Warp 에이전트의 핵심 엔진 역할을 합니다. 대부분의 상호작용을 처리하며, 필요한 경우 계획 수립이나 코드 생성 같은 작업을 위해 다른 모델을 호출합니다. Warp는 모델 가용성에 따라, 또는 대화 요약 같은 보조 작업을 위해 자동으로 다른 모델로 전환할 수 있습니다."
    full_terminal_use_model_description: "데이터베이스 셸, 디버거, REPL, 개발 서버 같은 대화형 터미널 애플리케이션 내에서 에이전트가 작동할 때 사용되는 모델입니다—실시간 출력을 읽고 PTY에 명령어를 씁니다."
    computer_use_model_description: "에이전트가 마우스 이동, 클릭, 키보드 입력을 통해 그래픽 애플리케이션과 상호작용하기 위해 컴퓨터를 제어할 때 사용되는 모델입니다."
    context_window_description: "기본 모델의 작업 기억 용량 — 대화, 코드, 문서 중 한 번에 고려할 수 있는 토큰 수를 의미합니다. 윈도우가 클수록 더 긴 대화와 더 큰 코드베이스에 대한 일관된 응답이 가능하지만, 지연 시간과 컴퓨팅 사용량이 늘어납니다."
    plan_auto_sync_description: "이 에이전트가 생성하는 계획은 자동으로 Warp Drive에 추가되고 동기화됩니다."
